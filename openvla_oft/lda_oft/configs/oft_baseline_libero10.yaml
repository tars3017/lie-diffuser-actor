# OpenVLA-OFT baseline (L1 regression action head, no score matching)
# LIBERO-10 / LIBERO-Long; reproduces row 1 (92.20) of the rebuttal table.
# No public ckpt — train from scratch (upstream moojink/openvla-7b-oft-finetuned-libero-10
# is a comparable public equivalent if you want a drop-in baseline).
variant: baseline
task_suite: libero_10
unnorm_key: libero_10_no_noops

# Model / head
vla_path: openvla/openvla-7b
use_l1_regression: true
use_diffusion: false
use_se3_score_matching: false
use_film: false
num_images_in_input: 2
use_proprio: true

# LoRA
use_lora: true
lora_rank: 32
lora_dropout: 0.0

# Train
batch_size: 4
learning_rate: 5e-4
num_steps_before_decay: 100000
max_steps: 150005
save_freq: 10000
image_aug: true

# Eval
center_crop: true
num_trials_per_task: 50
