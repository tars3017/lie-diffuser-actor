# LDA w/o Lie Diffusion — CALVIN ABCD->D (paper Table 1, ablation row).
# Source branch: gat-ddpm-2enc (ABCD-trained run).
# Reproduces SR1=91.0, AvgLen=3.239 with abcd_ddpm_300k.pth.
# (Filename says 300k; if you measured at 500k, document in README.)

dataset: ./data/calvin/packaged_ABCD_D_full/training/
valset: ./data/calvin/packaged_ABCD_D_full/validation/
instructions: instructions/calvin_task_ABCD_D/
gripper_loc_bounds: ../tasks/calvin_rel_traj_location_bounds_task_ABC_D.json
gripper_loc_bounds_buffer: 0.01

tasks: A B C D
training_split: ABCD
relative_action: 1
fps_subsampling_factor: 3
lang_enhanced: 1
quaternion_format: wxyz

backbone: clip
embedding_dim: 192
image_size: 256,256
num_history: 3
use_instruction: 1
rotation_parametrization: 6D
diffusion_timesteps: 100

use_gat: 1
diffusion_space: euclidean
loss_formulation: new

train_iters: 300000
batch_size: 4
batch_size_val: 1
num_workers: 64
max_episode_length: 30
dense_interpolation: 1
interpolation_length: 20
lr: 3.0e-4
end_lr: 3.0e-5
lr_decay: 0.1
wd: 5.0e-3
val_freq: 5000
val_iters: 2
cache_size: 0
cache_size_val: 0
keypose_only: 0

exp_log_dir: Planner_Calvin
run_log_dir: ablation_no_lie_abcd_d
